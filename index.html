<style>
:root {
  --gold: #FFD700;
  --gold2: #FFA500;
  --deep: #0a0a1a;
  --panel: #0d1b3e;
  --panel2: #112244;
  --accent: #00d4ff;
  --green: #00ff88;
  --red: #ff3355;
  --text: #e8eaf6;
  --muted: #8892b0;
  --radius: 14px;
  --glow: 0 0 20px rgba(255,215,0,0.4);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--deep);
  color: var(--text);
  font-family: 'Exo 2', sans-serif;
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse at 20% 20%, rgba(0,100,200,0.15) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 80%, rgba(255,215,0,0.08) 0%, transparent 60%),
    url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.02'%3E%3Ccircle cx='30' cy='30' r='1'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  overflow-x: hidden;
}

/* ── SPLASH / NAME ENTRY ───────────────────────────── */
#splash {
  position: fixed; inset: 0; z-index: 1000;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: radial-gradient(ellipse at center, #0d1b3e 0%, #050510 100%);
  gap: 24px;
  animation: fadeIn .6s ease;
}
.splash-logo {
  font-family: 'Cinzel', serif;
  font-size: clamp(1.6rem, 5vw, 3rem);
  font-weight: 900;
  background: linear-gradient(135deg, #FFD700, #FF8C00, #FFD700);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  text-shadow: none;
  text-align: center;
  line-height: 1.2;
  animation: shimmer 3s infinite;
}
.splash-sub {
  font-family: 'Noto Sans Kannada', sans-serif;
  font-size: 1.2rem; color: var(--accent);
  text-align: center;
}
.splash-hindi { font-family: 'Tiro Devanagari Hindi', serif; font-size: 1.1rem; color: var(--muted); }
.splash-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,215,0,0.2);
  border-radius: 20px;
  padding: 32px 40px;
  width: min(420px, 90vw);
  display: flex; flex-direction: column; gap: 16px;
  backdrop-filter: blur(12px);
}
.splash-card label { font-size: .85rem; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
.lang-btns { display: flex; gap: 10px; flex-wrap: wrap; }
.lang-btn {
  flex: 1; padding: 10px;
  border: 2px solid rgba(255,215,0,0.3);
  border-radius: 10px; background: transparent;
  color: var(--text); font-size: .95rem; cursor: pointer;
  transition: all .2s;
  font-family: inherit;
}
.lang-btn.active, .lang-btn:hover {
  border-color: var(--gold); background: rgba(255,215,0,0.15);
  color: var(--gold); box-shadow: 0 0 12px rgba(255,215,0,0.3);
}
.name-input {
  padding: 14px 18px;
  background: rgba(255,255,255,0.07);
  border: 2px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  color: #fff; font-size: 1.1rem;
  outline: none; transition: border .2s;
  font-family: 'Exo 2', sans-serif;
}
.name-input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(255,215,0,0.15); }
.start-btn {
  padding: 16px;
  background: linear-gradient(135deg, #FFD700, #FF8C00);
  border: none; border-radius: 12px;
  color: #000; font-size: 1.1rem; font-weight: 700;
  cursor: pointer; letter-spacing: 1px;
  transition: all .2s; font-family: 'Cinzel', serif;
}
.start-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(255,215,0,0.5); }
.start-btn:active { transform: translateY(0); }

/* ── MAIN APP ───────────────────────────────────────── */
#app { display: none; flex-direction: column; min-height: 100vh; }

/* Header */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 24px;
  background: rgba(13,27,62,0.95);
  border-bottom: 1px solid rgba(255,215,0,0.15);
  backdrop-filter: blur(8px);
  position: sticky; top: 0; z-index: 100;
  flex-wrap: wrap; gap: 10px;
}
.topbar-logo {
  font-family: 'Cinzel', serif; font-size: 1.2rem; font-weight: 900;
  background: linear-gradient(135deg, #FFD700, #FF8C00);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.player-badge {
  display: flex; align-items: center; gap: 8px;
  background: rgba(255,215,0,0.1);
  border: 1px solid rgba(255,215,0,0.3);
  border-radius: 30px; padding: 6px 14px;
}
.player-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  display: flex; align-items: center; justify-content: center;
  font-weight: 900; color: #000; font-size: .85rem;
}
.player-name { font-size: .9rem; color: var(--gold); font-weight: 600; }
.topbar-right { display: flex; align-items: center; gap: 10px; }
.lang-select {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  color: var(--text); padding: 6px 12px;
  border-radius: 8px; font-size: .85rem; cursor: pointer;
  font-family: inherit; outline: none;
}
.sound-btn {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  color: var(--text); padding: 7px 12px;
  border-radius: 8px; cursor: pointer; font-size: 1rem;
  transition: all .2s;
}
.sound-btn:hover { background: rgba(255,215,0,0.2); border-color: var(--gold); }
.sound-btn.muted { opacity: .5; }

/* Category tabs */
.cat-tabs {
  display: flex; gap: 4px; padding: 14px 16px 0;
  overflow-x: auto; scrollbar-width: thin;
  scrollbar-color: rgba(255,215,0,0.3) transparent;
  background: var(--panel);
  border-bottom: 2px solid rgba(255,215,0,0.12);
}
.cat-tabs::-webkit-scrollbar { height: 4px; }
.cat-tabs::-webkit-scrollbar-thumb { background: rgba(255,215,0,0.3); border-radius: 4px; }
.cat-tab {
  flex-shrink: 0;
  padding: 10px 18px;
  border-radius: 10px 10px 0 0;
  border: 1px solid transparent;
  border-bottom: none;
  background: transparent;
  color: var(--muted);
  cursor: pointer; font-size: .82rem; font-weight: 600;
  transition: all .2s; letter-spacing: .5px;
  font-family: inherit; white-space: nowrap;
  display: flex; align-items: center; gap: 6px;
}
.cat-tab:hover { color: var(--text); background: rgba(255,255,255,0.05); }
.cat-tab.active {
  background: var(--deep);
  border-color: rgba(255,215,0,0.3);
  color: var(--gold);
  box-shadow: 0 0 14px rgba(255,215,0,0.15) inset;
}
.cat-icon { font-size: 1.1rem; }

/* Main layout */
.main-layout {
  display: grid;
  grid-template-columns: 280px 1fr;
  flex: 1; gap: 0;
}

/* Level sidebar */
.level-sidebar {
  background: var(--panel);
  border-right: 1px solid rgba(255,215,0,0.1);
  padding: 20px 16px;
  overflow-y: auto;
  max-height: calc(100vh - 120px);
}
.sidebar-title {
  font-size: .75rem; letter-spacing: 2px; text-transform: uppercase;
  color: var(--muted); margin-bottom: 14px; padding-left: 4px;
}
.level-grid { display: flex; flex-direction: column; gap: 8px; }
.level-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.06);
  background: rgba(255,255,255,0.03);
  cursor: pointer; transition: all .25s;
  position: relative;
}
.level-item:hover:not(.locked) { background: rgba(255,215,0,0.08); border-color: rgba(255,215,0,0.25); }
.level-item.active { background: rgba(255,215,0,0.12); border-color: rgba(255,215,0,0.4); }
.level-item.locked { opacity: .45; cursor: not-allowed; }
.level-item.completed { border-color: rgba(0,255,136,0.3); }
.level-num {
  width: 34px; height: 34px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: .9rem; flex-shrink: 0;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
}
.level-item.active .level-num { background: linear-gradient(135deg,#FFD700,#FF8C00); color: #000; border-color: transparent; }
.level-item.completed .level-num { background: rgba(0,255,136,0.2); color: var(--green); border-color: rgba(0,255,136,0.4); }
.level-info { flex: 1; }
.level-name { font-size: .85rem; font-weight: 600; color: var(--text); }
.level-prize {
  font-size: .75rem; color: var(--gold2);
  font-family: 'Cinzel', serif; margin-top: 2px;
}
.level-badge {
  font-size: .8rem;
}
.lock-icon { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); font-size: .9rem; opacity: .6; }
.progress-bar-wrap { margin-top: 16px; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 10px; }
.progress-label { font-size: .75rem; color: var(--muted); margin-bottom: 6px; }
.progress-bar { height: 6px; background: rgba(255,255,255,0.08); border-radius: 6px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg,#00d4ff,#00ff88); border-radius: 6px; transition: width .5s; }

/* Quiz area */
.quiz-area {
  padding: 28px;
  display: flex; flex-direction: column;
  gap: 24px; overflow-y: auto;
  max-height: calc(100vh - 120px);
}

/* Question card */
.q-meta {
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px; flex-wrap: wrap;
}
.q-badge {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: .8rem; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase;
}
.q-badge.difficulty-easy { background: rgba(0,255,136,0.1); color: var(--green); border: 1px solid rgba(0,255,136,0.3); }
.q-badge.difficulty-medium { background: rgba(255,215,0,0.1); color: var(--gold); border: 1px solid rgba(255,215,0,0.3); }
.q-badge.difficulty-hard { background: rgba(255,51,85,0.1); color: var(--red); border: 1px solid rgba(255,51,85,0.3); }
.prize-amount {
  font-family: 'Cinzel', serif;
  font-size: 1.1rem; font-weight: 700; color: var(--gold);
  text-shadow: 0 0 20px rgba(255,215,0,0.5);
}
.q-number { font-size: .8rem; color: var(--muted); }

.question-card {
  background: linear-gradient(135deg, rgba(17,34,68,0.9), rgba(13,27,62,0.9));
  border: 1px solid rgba(255,215,0,0.2);
  border-radius: var(--radius);
  padding: 28px 32px;
  position: relative; overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
}
.question-card::before {
  content: ''; position: absolute;
  top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}
.question-text {
  font-size: clamp(1rem, 2.5vw, 1.25rem);
  line-height: 1.7;
  color: #fff;
}
.question-text.kannada { font-family: 'Noto Sans Kannada', sans-serif; }
.question-text.hindi { font-family: 'Tiro Devanagari Hindi', serif; }

/* Options */
.options-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}
.option-btn {
  display: flex; align-items: center; gap: 14px;
  padding: 16px 20px;
  background: rgba(17,34,68,0.8);
  border: 2px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  color: var(--text); font-size: .95rem;
  cursor: pointer; text-align: left;
  transition: all .2s; position: relative; overflow: hidden;
  font-family: inherit;
}
.option-btn:hover:not(:disabled) {
  border-color: rgba(0,212,255,0.5);
  background: rgba(0,212,255,0.08);
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(0,212,255,0.15);
}
.option-btn:disabled { cursor: not-allowed; }
.opt-letter {
  width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  background: rgba(255,215,0,0.15);
  border: 1px solid rgba(255,215,0,0.3);
  font-weight: 700; font-size: .85rem; color: var(--gold);
  transition: all .2s;
}
.opt-text { flex: 1; line-height: 1.4; }
.opt-text.kannada { font-family: 'Noto Sans Kannada', sans-serif; }
.opt-text.hindi { font-family: 'Tiro Devanagari Hindi', serif; }

/* Answer states */
.option-btn.correct {
  border-color: var(--green) !important;
  background: rgba(0,255,136,0.12) !important;
  animation: flashGreen .15s ease 0s, flashGreen .15s ease .3s, flashGreen .15s ease .6s;
}
.option-btn.correct .opt-letter { background: var(--green); color: #000; border-color: var(--green); }
.option-btn.wrong {
  border-color: var(--red) !important;
  background: rgba(255,51,85,0.12) !important;
  animation: flashRed .15s ease 0s, flashRed .15s ease .3s, flashRed .15s ease .6s;
}
.option-btn.wrong .opt-letter { background: var(--red); color: #fff; border-color: var(--red); }

@keyframes flashGreen {
  0%,100% { box-shadow: 0 0 0 rgba(0,255,136,0); }
  50% { box-shadow: 0 0 30px rgba(0,255,136,0.6), inset 0 0 20px rgba(0,255,136,0.2); }
}
@keyframes flashRed {
  0%,100% { box-shadow: 0 0 0 rgba(255,51,85,0); }
  50% { box-shadow: 0 0 30px rgba(255,51,85,0.6), inset 0 0 20px rgba(255,51,85,0.2); }
}

/* Feedback banner */
.feedback-banner {
  padding: 16px 24px;
  border-radius: 12px;
  display: flex; align-items: center; gap: 14px;
  font-size: 1rem; font-weight: 600;
  animation: slideUp .3s ease;
  display: none;
}
.feedback-banner.correct { background: rgba(0,255,136,0.12); border: 1px solid rgba(0,255,136,0.4); color: var(--green); }
.feedback-banner.wrong { background: rgba(255,51,85,0.12); border: 1px solid rgba(255,51,85,0.4); color: var(--red); }
.feedback-icon { font-size: 1.5rem; }
.feedback-text .label { font-size: .75rem; opacity: .7; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 2px; }
.feedback-text .msg { font-size: .95rem; }
.feedback-text .msg.kannada { font-family: 'Noto Sans Kannada', sans-serif; }
.feedback-text .msg.hindi { font-family: 'Tiro Devanagari Hindi', serif; }

/* Next / Result buttons */
.action-row { display: flex; justify-content: flex-end; gap: 12px; }
.next-btn {
  padding: 14px 32px;
  background: linear-gradient(135deg, #FFD700, #FF8C00);
  border: none; border-radius: 10px;
  color: #000; font-size: 1rem; font-weight: 700;
  cursor: pointer; letter-spacing: .5px;
  transition: all .2s; display: none;
  font-family: 'Cinzel', serif;
}
.next-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(255,215,0,0.4); }

/* Score strip */
.score-strip {
  display: flex; gap: 16px; flex-wrap: wrap;
}
.score-card {
  flex: 1; min-width: 120px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px; padding: 12px 16px;
  text-align: center;
}
.score-card .val { font-family: 'Cinzel', serif; font-size: 1.4rem; color: var(--gold); font-weight: 900; }
.score-card .lbl { font-size: .72rem; color: var(--muted); margin-top: 2px; letter-spacing: 1px; text-transform: uppercase; }

/* Level complete overlay */
.level-overlay {
  display: none; position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,0.85);
  align-items: center; justify-content: center;
  backdrop-filter: blur(6px);
}
.level-overlay.show { display: flex; animation: fadeIn .3s ease; }
.level-complete-card {
  background: linear-gradient(135deg, #0d1b3e, #112244);
  border: 2px solid rgba(255,215,0,0.4);
  border-radius: 20px; padding: 40px 48px;
  text-align: center; max-width: 480px; width: 90%;
  box-shadow: 0 0 80px rgba(255,215,0,0.2);
  animation: popIn .4s cubic-bezier(.34,1.56,.64,1);
}
.level-complete-card h2 {
  font-family: 'Cinzel', serif; font-size: 2rem;
  background: linear-gradient(135deg,#FFD700,#FF8C00);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
}
.level-complete-card .score-big {
  font-family: 'Cinzel', serif; font-size: 3rem; color: var(--gold);
  font-weight: 900; margin: 16px 0;
}
.level-complete-card p { color: var(--muted); margin-bottom: 24px; line-height: 1.6; }
.level-complete-card p.kannada { font-family: 'Noto Sans Kannada', sans-serif; }
.level-complete-card p.hindi { font-family: 'Tiro Devanagari Hindi', serif; }
.btn-row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
.btn-outline {
  padding: 12px 24px;
  border: 2px solid rgba(255,215,0,0.4);
  border-radius: 10px; background: transparent;
  color: var(--gold); font-size: .9rem; font-weight: 600;
  cursor: pointer; transition: all .2s; font-family: inherit;
}
.btn-outline:hover { background: rgba(255,215,0,0.1); }
.btn-primary {
  padding: 12px 24px;
  background: linear-gradient(135deg,#FFD700,#FF8C00);
  border: none; border-radius: 10px;
  color: #000; font-size: .9rem; font-weight: 700;
  cursor: pointer; font-family: 'Cinzel', serif;
  transition: all .2s;
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,215,0,0.4); }
.confetti-wrap { font-size: 3rem; margin-bottom: 8px; }
.stars-row { display: flex; justify-content: center; gap: 4px; font-size: 1.6rem; margin: 12px 0; }

/* Animations */
@keyframes fadeIn { from { opacity:0 } to { opacity:1 } }
@keyframes slideUp { from { opacity:0; transform:translateY(12px) } to { opacity:1; transform:translateY(0) } }
@keyframes popIn { from { opacity:0; transform:scale(.85) } to { opacity:1; transform:scale(1) } }
@keyframes shimmer {
  0%,100% { filter: brightness(1) }
  50% { filter: brightness(1.3) }
}
@keyframes pulse {
  0%,100% { transform: scale(1) }
  50% { transform: scale(1.05) }
}

/* Mobile responsive */
@media (max-width: 768px) {
  .main-layout { grid-template-columns: 1fr; }
  .level-sidebar { max-height: none; border-right: none; border-bottom: 1px solid rgba(255,215,0,0.1); }
  .level-grid { flex-direction: row; overflow-x: auto; padding-bottom: 4px; }
  .level-item { min-width: 130px; }
  .options-grid { grid-template-columns: 1fr; }
  .quiz-area { max-height: none; padding: 16px; }
  .cat-tabs { padding: 10px 10px 0; }
  .cat-tab { padding: 8px 12px; font-size: .78rem; }
}
@media (max-width: 480px) {
  .topbar { padding: 10px 14px; }
  .question-card { padding: 18px 16px; }
  .option-btn { padding: 13px 14px; }
}

/* Loading shimmer */
.shimmer { animation: shimmerBg 1.5s infinite; }
@keyframes shimmerBg {
  0% { background-position: -200% 0 }
  100% { background-position: 200% 0 }
}

/* Toast */
.toast {
  position: fixed; bottom: 24px; right: 24px; z-index: 9999;
  background: rgba(17,34,68,0.95);
  border: 1px solid rgba(255,215,0,0.3);
  border-radius: 10px; padding: 12px 20px;
  font-size: .9rem; color: var(--text);
  backdrop-filter: blur(8px);
  transform: translateY(80px); opacity: 0;
  transition: all .3s;
  max-width: 280px;
}
.toast.show { transform: translateY(0); opacity: 1; }
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">

  <div class="splash-sub">ಕೌನ್ ಬನೇಗಾ ಕರೋಡ್‌ಪತಿ — ಕನ್ನಡ ಆವೃತ್ತಿ</div>
  <div class="splash-hindi">कौन बनेगा करोड़पति — ಕನ್ನಡ Edition</div>

  <div class="splash-card">
    <label>🌐 Select Language / ಭಾಷೆ ಆಯ್ಕೆ / भाषा चुनें</label>
    <div class="lang-btns">
      <button class="lang-btn active" onclick="selectLang('en')" id="lb-en">English</button>
      <button class="lang-btn" onclick="selectLang('kn')" id="lb-kn">ಕನ್ನಡ</button>
      <button class="lang-btn" onclick="selectLang('hi')" id="lb-hi">हिंदी</button>

    <button class="start-btn" onclick="startQuiz()">▶ START QUIZ</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-logo">🏆 ಕೋಟ್ಯಾಧಿಪತಿ</div>
    <div class="player-badge">
      <div class="player-avatar" id="playerInitial">G</div>
      <span class="player-name" id="playerNameDisplay">Player</span>
    </div>
    <div class="topbar-right">
      <select class="lang-select" onchange="changeLanguage(this.value)" id="langSelect">
        <option value="en">English</option>
        <option value="kn">ಕನ್ನಡ</option>
        <option value="hi">हिंदी</option>
      </select>
      <button class="sound-btn" id="soundBtn" onclick="toggleSound()" title="Toggle Sound">🔊</button>
    </div>
  </div>

  <!-- Category tabs -->
  <div class="cat-tabs" id="catTabs"></div>

  <!-- Score strip -->
  <div style="padding:12px 20px 0; background:var(--panel);">
    <div class="score-strip">
      <div class="score-card"><div class="val" id="scoreTotal">₹0</div><div class="lbl" id="lbl-total">Total Won</div></div>
      <div class="score-card"><div class="val" id="scoreCorrect">0</div><div class="lbl" id="lbl-correct">Correct</div></div>
      <div class="score-card"><div class="val" id="scoreStreak">0</div><div class="lbl" id="lbl-streak">Streak 🔥</div></div>
      <div class="score-card"><div class="val" id="catProgress">0/10</div><div class="lbl" id="lbl-progress">Level Progress</div></div>
    </div>
  </div>

  <!-- Main layout -->
  <div class="main-layout">
    <!-- Level sidebar -->
    <div class="level-sidebar">
      <div class="sidebar-title" id="sidebar-title">Levels</div>
      <div class="level-grid" id="levelGrid"></div>
      <div class="progress-bar-wrap">
        <div class="progress-label" id="prog-label">Category Progress: 0%</div>
        <div class="progress-bar"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
      </div>
    </div>

    <!-- Quiz area -->
    <div class="quiz-area" id="quizArea">
      <!-- filled by JS -->
    </div>
  </div>
</div>

<!-- Level complete overlay -->
<div class="level-overlay" id="levelOverlay">
  <div class="level-complete-card">
    <div class="confetti-wrap" id="overlayEmoji">🎉</div>
    <h2 id="overlayTitle">Level Complete!</h2>
    <div class="stars-row" id="overlayStars">⭐⭐⭐</div>
    <div class="score-big" id="overlayScore">8/10</div>
    <p id="overlayMsg">Great job!</p>
    <div class="btn-row">
      <button class="btn-outline" onclick="closeOverlay()" id="overlayRetry">Try Again</button>
      <button class="btn-primary" onclick="goNextLevel()" id="overlayNext">Next Level →</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

    ...Array.from({length:9},(_,qi)=>Q(
      `${cat} Level ${li+1} Question ${qi+2}`,["Option A","Option B","Option C","Option D"],
      `${cat} ಹಂತ ${li+1} ಪ್ರಶ್ನೆ ${qi+2}`,["ಆಯ್ಕೆ A","ಆಯ್ಕೆ B","ಆಯ್ಕೆ C","ಆಯ್ಕೆ D"],
      `${cat} स्तर ${li+1} प्रश्न ${qi+2}`,["विकल्प A","विकल्प B","विकल्प C","विकल्प D"],
      qi%4,diff))
  ];
}

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let state = {
  lang: 'en',
  playerName: '',
  sessionId: null,
  activeCat: 'history',
  activeLevel: 0,  // index
  qIndex: 0,
  answered: false,
  score: { total: 0, correct: 0, streak: 0 },
  // per-category level status: {locked, completed, score}
  catStatus: {},
  soundOn: true,
};

// Init cat status
function initCatStatus() {
  CATEGORIES.forEach(c => {
    state.catStatus[c.id] = Array.from({length:10}, (_,i) => ({
      locked: i > 0,
      completed: false,
      score: 0
    }));
  });
  // Load from localStorage
  try {
    const saved = localStorage.getItem('kqp_status');
    if (saved) state.catStatus = JSON.parse(saved);
  } catch(e){}
}

function saveCatStatus() {
  try { localStorage.setItem('kqp_status', JSON.stringify(state.catStatus)); } catch(e){}
}

// ═══════════════════════════════════════════════════════
// SPLASH / INIT
// ═══════════════════════════════════════════════════════
function selectLang(l) {
  state.lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('lb-'+l).classList.add('active');
}

async function startQuiz() {
  const name = document.getElementById('playerName').value.trim();
  if (!name) { showToast('Please enter your name / ಹೆಸರು ನಮೂದಿಸಿ'); return; }
  state.playerName = name;
  initCatStatus();

  // Save to Firebase
  try {
    if (window._db && window._fbModules) {
      const { collection, addDoc, serverTimestamp } = window._fbModules;
      const docRef = await addDoc(collection(window._db, 'quiz_participants'), {
        name: name,
        language: state.lang,
        startedAt: serverTimestamp(),
        scores: {},
        totalCorrect: 0,
        totalWon: 0,
      });
      state.sessionId = docRef.id;
    }
  } catch(e) { console.warn('Firebase not configured:', e.message); }

  document.getElementById('splash').style.display = 'none';
  const app = document.getElementById('app');
  app.style.display = 'flex';

  document.getElementById('playerNameDisplay').textContent = name;
  document.getElementById('playerInitial').textContent = name[0].toUpperCase();
  document.getElementById('langSelect').value = state.lang;

  buildCatTabs();
  selectCategory('history');
}

// ═══════════════════════════════════════════════════════
// CATEGORY & LEVELS
// ═══════════════════════════════════════════════════════
function buildCatTabs() {
  const el = document.getElementById('catTabs');
  el.innerHTML = '';
  const u = UI[state.lang];
  CATEGORIES.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'cat-tab' + (c.id === state.activeCat ? ' active' : '');
    btn.innerHTML = `<span class="cat-icon">${c.icon}</span>${c.label[state.lang]}`;
    btn.onclick = () => selectCategory(c.id);
    el.appendChild(btn);
  });
}

function selectCategory(catId) {
  state.activeCat = catId;
  state.activeLevel = 0;
  document.querySelectorAll('.cat-tab').forEach((t,i) => {
    t.classList.toggle('active', CATEGORIES[i].id === catId);
  });
  buildLevelSidebar();
  // auto-select first unlocked level
  const levels = state.catStatus[catId];
  const firstUnlocked = levels.findIndex(l => !l.locked);
  selectLevel(firstUnlocked >= 0 ? firstUnlocked : 0);
}

function buildLevelSidebar() {
  const cat = state.activeCat;
  const levels = state.catStatus[cat];
  const u = UI[state.lang];
  document.getElementById('sidebar-title').textContent = u.sidebarTitle;

  const grid = document.getElementById('levelGrid');
  grid.innerHTML = '';

  levels.forEach((lv, i) => {
    const item = document.createElement('div');
    item.className = 'level-item' +
      (lv.locked ? ' locked' : '') +
      (lv.completed ? ' completed' : '') +
      (i === state.activeLevel ? ' active' : '');
    item.onclick = () => { if (!lv.locked) selectLevel(i); else showToast(u.locked); };

    const diff = i < 3 ? u.easy : i < 6 ? u.medium : u.hard;
    const stars = lv.completed ? (lv.score >= 9 ? '⭐⭐⭐' : lv.score >= 7 ? '⭐⭐' : '⭐') : '';

    item.innerHTML = `
      <div class="level-num">${i+1}</div>
      <div class="level-info">
        <div class="level-name">${u.levelTitle} ${i+1}</div>
        <div class="level-prize">${PRIZES[i]}</div>
      </div>
      <div class="level-badge">${stars}</div>
      ${lv.locked ? '<div class="lock-icon">🔒</div>' : ''}
    `;
    grid.appendChild(item);
  });

  // Progress
  const completed = levels.filter(l=>l.completed).length;
  const pct = Math.round(completed/10*100);
  document.getElementById('progFill').style.width = pct+'%';
  document.getElementById('prog-label').textContent = UI[state.lang].progLabel(pct);
}

function selectLevel(li) {
  state.activeLevel = li;
  state.qIndex = 0;
  state.answered = false;
  buildLevelSidebar();
  updateScoreStrip();
  renderQuestion();
}

// ═══════════════════════════════════════════════════════
// QUESTION RENDERING
// ═══════════════════════════════════════════════════════
function renderQuestion() {
  const cat = state.activeCat;
  const li = state.activeLevel;
  const qi = state.qIndex;
  const qs = QUESTIONS[cat][li];
  const q = qs[qi];
  const u = UI[state.lang];
  const lang = state.lang;
  const langCls = lang === 'kn' ? 'kannada' : lang === 'hi' ? 'hindi' : '';
  const total = qs.length;
  const diffLabels = [u.easy, u.medium, u.hard];
  const diffClass = ['difficulty-easy','difficulty-medium','difficulty-hard'];

  const area = document.getElementById('quizArea');
  area.innerHTML = `
    <div class="q-meta">
      <span class="q-badge ${diffClass[q.diff]}">${diffLabels[q.diff]}</span>
      <span class="prize-amount">🏆 ${PRIZES[li]}</span>
      <span class="q-number">${u.q(qi+1, total)}</span>
    </div>

    <div class="question-card">
      <p class="question-text ${langCls}">${q.q[lang]}</p>
    </div>

    <div class="options-grid" id="optionsGrid">
      ${q.opts[lang].map((opt, oi) => `
        <button class="option-btn" id="opt-${oi}" onclick="selectAnswer(${oi})">
          <span class="opt-letter">${String.fromCharCode(65+oi)}</span>
          <span class="opt-text ${langCls}">${opt}</span>
        </button>
      `).join('')}
    </div>

    <div class="feedback-banner" id="feedbackBanner">
      <span class="feedback-icon" id="feedbackIcon"></span>
      <div class="feedback-text">
        <div class="label" id="feedbackLabel"></div>
        <div class="msg ${langCls}" id="feedbackMsg"></div>
      </div>
    </div>

    <div class="action-row">
      <button class="next-btn" id="nextBtn" onclick="nextQuestion()">
        ${qi < total-1 ? u.next : u.finish} →
      </button>
    </div>
  `;

  updateScoreStrip();

  // Speak question
  if (state.soundOn) speakText(q.q[lang], lang);
}

// ═══════════════════════════════════════════════════════
// ANSWER LOGIC
// ═══════════════════════════════════════════════════════
let levelCorrectCount = 0;

function selectAnswer(chosen) {
  if (state.answered) return;
  state.answered = true;

  const cat = state.activeCat;
  const li = state.activeLevel;
  const qi = state.qIndex;
  const q = QUESTIONS[cat][li][qi];
  const lang = state.lang;
  const langCls = lang==='kn'?'kannada':lang==='hi'?'hindi':'';
  const u = UI[lang];
  const correct = q.ans === chosen;

  // Disable all buttons
  document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);

  // Highlight
  const correctBtn = document.getElementById('opt-'+q.ans);
  const chosenBtn = document.getElementById('opt-'+chosen);
  correctBtn.classList.add('correct');
  if (!correct) chosenBtn.classList.add('wrong');

  // Feedback
  const banner = document.getElementById('feedbackBanner');
  const icon = document.getElementById('feedbackIcon');
  const label = document.getElementById('feedbackLabel');
  const msg = document.getElementById('feedbackMsg');
  const correctAnswerText = q.opts[lang][q.ans];

  if (correct) {
    banner.className = 'feedback-banner correct';
    icon.textContent = '✅';
    label.textContent = u.right;
    msg.textContent = u.rightMsg(correctAnswerText);
    state.score.correct++;
    state.score.streak++;
    if (state.score.streak >= 3) showToast(u.streakBonus);
    if (state.soundOn) playTone('correct');
    levelCorrectCount++;
  } else {
    banner.className = 'feedback-banner wrong';
    icon.textContent = '❌';
    label.textContent = u.wrong;
    msg.textContent = u.wrongMsg(correctAnswerText);
    state.score.streak = 0;
    if (state.soundOn) playTone('wrong');
  }
  banner.style.display = 'flex';
  msg.className = 'msg ' + langCls;

  // Speak feedback
  if (state.soundOn) {
    const speechText = correct
    ? u.rightMsg(correctAnswerText)
    : u.wrongMsg(correctAnswerText);
    setTimeout(() => speakText(speechText, lang), 400);
  }

  document.getElementById('nextBtn').style.display = 'inline-block';
  updateScoreStrip();
}

function nextQuestion() {
  const cat = state.activeCat;
  const li = state.activeLevel;
  const total = QUESTIONS[cat][li].length;

  if (state.qIndex < total - 1) {
    state.qIndex++;
    state.answered = false;
    renderQuestion();
  } else {
    // Level finished
    finishLevel();
  }
}

function finishLevel() {
  const cat = state.activeCat;
  const li = state.activeLevel;
  const total = QUESTIONS[cat][li].length;
  const passed = levelCorrectCount / total >= PASS_THRESHOLD;
  const u = UI[state.lang];
  const lang = state.lang;
  const langCls = lang==='kn'?'kannada':lang==='hi'?'hindi':'';

  // Update status
  state.catStatus[cat][li].completed = passed;
  state.catStatus[cat][li].score = levelCorrectCount;
  if (passed && li < 9) {
    state.catStatus[cat][li+1].locked = false;
  }
  state.score.total += levelCorrectCount * parseInt(PRIZES[li].replace(/[₹,]/g,''));

  saveCatStatus();
  updateFirebaseScore();

  // Stars
  const stars = levelCorrectCount >= total*0.9 ? '⭐⭐⭐' : levelCorrectCount >= total*0.7 ? '⭐⭐' : '⭐';
  const emoji = passed ? '🎉' : '😔';

  document.getElementById('overlayEmoji').textContent = emoji;
  document.getElementById('overlayTitle').textContent = passed ? u.lvlComplete : u.lvlFail;
  document.getElementById('overlayStars').textContent = passed ? stars : '';
  document.getElementById('overlayScore').textContent = `${levelCorrectCount}/${total}`;
  const overlayMsg = document.getElementById('overlayMsg');
  overlayMsg.textContent = passed ? u.lvlPassMsg(levelCorrectCount,total) : u.lvlFailMsg(levelCorrectCount,total);
  overlayMsg.className = langCls;
  document.getElementById('overlayRetry').textContent = u.tryAgain;
  document.getElementById('overlayNext').textContent = u.nextLevel;

  const nextBtn = document.getElementById('overlayNext');
  nextBtn.style.display = passed && li < 9 ? 'inline-block' : 'none';

  document.getElementById('levelOverlay').classList.add('show');
  if (state.soundOn) playTone(passed ? 'win' : 'lose');
  levelCorrectCount = 0;
}

function closeOverlay() {
  document.getElementById('levelOverlay').classList.remove('show');
  buildLevelSidebar();
  state.qIndex = 0;
  state.answered = false;
  renderQuestion();
}

function goNextLevel() {
  document.getElementById('levelOverlay').classList.remove('show');
  const nextLi = state.activeLevel + 1;
  if (nextLi < 10) selectLevel(nextLi);
  else buildLevelSidebar();
}

// ═══════════════════════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════════════════════
function updateScoreStrip() {
  const u = UI[state.lang];
  document.getElementById('scoreTotal').textContent = '₹' + state.score.total.toLocaleString('en-IN');
  document.getElementById('scoreCorrect').textContent = state.score.correct;
  document.getElementById('scoreStreak').textContent = state.score.streak;
  document.getElementById('catProgress').textContent =
    `${state.qIndex + (state.answered?1:0)}/${QUESTIONS[state.activeCat][state.activeLevel].length}`;
  document.getElementById('lbl-total').textContent = u.totalWon;
  document.getElementById('lbl-correct').textContent = u.correct;
  document.getElementById('lbl-streak').textContent = u.streak;
  document.getElementById('lbl-progress').textContent = u.levelProg;
}

function changeLanguage(lang) {
  state.lang = lang;
  buildCatTabs();
  buildLevelSidebar();
  updateScoreStrip();
  renderQuestion();
}

function toggleSound() {
  state.soundOn = !state.soundOn;
  const btn = document.getElementById('soundBtn');
  btn.textContent = state.soundOn ? '🔊' : '🔇';
  btn.classList.toggle('muted', !state.soundOn);
  if (!state.soundOn) window.speechSynthesis?.cancel();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ═══════════════════════════════════════════════════════
// SOUND — Web Speech API + Web Audio
// ═══════════════════════════════════════════════════════
function speakText(text, lang) {
  if (!state.soundOn || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = lang === 'kn' ? 'kn-IN' : lang === 'hi' ? 'hi-IN' : 'en-IN';
  utter.rate = 0.9; utter.pitch = 1; utter.volume = 0.9;
  window.speechSynthesis.speak(utter);
}

function playTone(type) {
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    if (type === 'correct') {
      osc.frequency.setValueAtTime(523, ctx.currentTime);
      osc.frequency.setValueAtTime(659, ctx.currentTime+0.1);
      osc.frequency.setValueAtTime(784, ctx.currentTime+0.2);
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.5);
      osc.start(); osc.stop(ctx.currentTime+0.5);
    } else if (type === 'wrong') {
      osc.frequency.setValueAtTime(220, ctx.currentTime);
      osc.frequency.setValueAtTime(180, ctx.currentTime+0.15);
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.4);
      osc.start(); osc.stop(ctx.currentTime+0.4);
    } else if (type === 'win') {
      [523,659,784,1047].forEach((f,i) => {
        const o2 = ctx.createOscillator(); const g2 = ctx.createGain();
        o2.connect(g2); g2.connect(ctx.destination);
        o2.frequency.value = f; g2.gain.setValueAtTime(0.2, ctx.currentTime+i*0.12);
        g2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+i*0.12+0.3);
        o2.start(ctx.currentTime+i*0.12); o2.stop(ctx.currentTime+i*0.12+0.3);
      });
    } else {
      osc.frequency.value = 150;
      gain.gain.setValueAtTime(0.2, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.6);
      osc.start(); osc.stop(ctx.currentTime+0.6);
    }
  } catch(e){}
}

// ═══════════════════════════════════════════════════════
// FIREBASE SCORE UPDATE
// ═══════════════════════════════════════════════════════
async function updateFirebaseScore() {
  if (!window._db || !state.sessionId || !window._fbModules) return;
  try {
    const { doc, updateDoc } = window._fbModules;
    await updateDoc(doc(window._db, 'quiz_participants', state.sessionId), {
      totalCorrect: state.score.correct,
      totalWon: state.score.total,
      lastUpdated: new Date().toISOString(),
      [`scores.${state.activeCat}_level${state.activeLevel+1}`]: state.catStatus[state.activeCat][state.activeLevel].score
    });
  } catch(e) { console.warn('Score update failed:', e.message); }
}
